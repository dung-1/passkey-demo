<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Passkey Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-4">Đăng nhập</h2>
                        
                        <div id="errorMessage" class="alert alert-danger" style="display: none;"></div>
                        <div id="successMessage" class="alert alert-success" style="display: none;"></div>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Mật khẩu</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            <div class="d-grid gap-2 mb-3">
                                <button type="submit" class="btn btn-primary">Đăng nhập bằng mật khẩu</button>
                            </div>
                        </form>

                        <div class="text-center mb-3">
                            <hr>
                            <p class="text-muted">HOẶC</p>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="button" class="btn btn-outline-primary" id="passkeyLoginBtn">
                                🔐 Đăng nhập bằng Passkey/Biometric
                            </button>
                        </div>

                        <div class="text-center mt-3">
                            <a th:href="@{/register}">Chưa có tài khoản? Đăng ký</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Helper function to convert base64url to Uint8Array
        function base64UrlToUint8Array(base64url) {
            // Validate input
            if (!base64url || typeof base64url !== 'string') {
                throw new Error('Invalid base64url input: must be a non-empty string');
            }
            
            // Remove any existing padding
            base64url = base64url.replace(/=/g, '');
            
            // Replace URL-safe characters to standard base64
            let base64 = base64url.replace(/-/g, '+').replace(/_/g, '/');
            
            // Calculate and add correct padding (0, 1, 2, or 3)
            const paddingNeeded = (4 - (base64.length % 4)) % 4;
            base64 += '='.repeat(paddingNeeded);
            
            // Decode base64 to binary string
            const binaryString = atob(base64);
            
            // Convert to Uint8Array
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            
            return bytes;
        }

        // Helper function to set button loading state
        function setButtonLoading(buttonId, loading) {
            const button = document.getElementById(buttonId);
            if (loading) {
                button.disabled = true;
                button.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang xử lý...';
            } else {
                button.disabled = false;
                button.innerHTML = '🔐 Đăng nhập bằng Passkey/Biometric';
            }
        }

        // Login with password
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            
            try {
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang đăng nhập...';
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.text();
                if (response.ok) {
                    localStorage.setItem('jwt', result);
                    showSuccess('Đăng nhập thành công! Đang chuyển hướng...');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 500);
                } else {
                    showError('Đăng nhập thất bại: ' + result);
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalText;
                }
            } catch (error) {
                showError('Lỗi kết nối: ' + error.message);
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });

        // Login with passkey
        document.getElementById('passkeyLoginBtn').addEventListener('click', async function() {
            const email = document.getElementById('email').value;
            if (!email) {
                showError('Vui lòng nhập email trước');
                return;
            }

            // Check if WebAuthn is supported
            if (!window.PublicKeyCredential) {
                showError('Trình duyệt của bạn không hỗ trợ WebAuthn/Passkey');
                return;
            }

            setButtonLoading('passkeyLoginBtn', true);
            hideMessages();

            try {
                // Step 1: Get authentication options
                const startResponse = await fetch(`/login-passkey/start?email=${encodeURIComponent(email)}`);
                
                if (!startResponse.ok) {
                    const errorText = await startResponse.text();
                    if (startResponse.status === 404) {
                        throw new Error('Không tìm thấy người dùng hoặc chưa đăng ký passkey');
                    }
                    throw new Error(errorText || 'Không thể lấy thông tin xác thực');
                }
                
                const options = await startResponse.json();
                
                // Validate response
                if (!options.challenge) {
                    throw new Error('Thông tin xác thực không hợp lệ');
                }

                // Step 2: Call WebAuthn API
                // Handle challenge - WebAuthn4J may serialize it as an object with 'value' property
                // or as a direct Base64URL string
                let challengeBytes;
                try {
                    let challengeString = null;
                    
                    // Check if challenge is an object with 'value' property (WebAuthn4J serialization)
                    if (options.challenge && typeof options.challenge === 'object') {
                        if (options.challenge.value) {
                            // WebAuthn4J serializes Challenge as { "value": "base64url_string" }
                            challengeString = options.challenge.value;
                        } else if (Array.isArray(options.challenge)) {
                            // If it's already an array, convert directly
                            challengeBytes = new Uint8Array(options.challenge);
                        } else {
                            throw new Error('Challenge object does not have expected format');
                        }
                    } else if (typeof options.challenge === 'string') {
                        challengeString = options.challenge;
                    } else {
                        throw new Error(`Unexpected challenge type: ${typeof options.challenge}`);
                    }

                    // If we have a string, decode it from Base64URL
                    if (challengeString !== null) {
                        // Validate challenge format
                        if (!challengeString || challengeString.trim() === '') {
                            throw new Error('Challenge string is empty');
                        }
                        challengeBytes = base64UrlToUint8Array(challengeString);
                    }

                    // Validate we have challenge bytes
                    if (!challengeBytes || challengeBytes.length === 0) {
                        throw new Error('Challenge bytes are empty after decoding');
                    }

                    // Verify challenge length (should be 32 bytes for WebAuthn)
                    if (challengeBytes.length !== 32) {
                        throw new Error(`Invalid challenge length: ${challengeBytes.length} bytes, expected 32 bytes`);
                    }
                } catch (error) {
                    console.error('[ERROR] Challenge decoding failed:', error);
                    console.error('[ERROR] Challenge value:', options.challenge);
                    throw new Error(`Failed to decode challenge: ${error.message}`);
                }

                // Handle allowCredentials - credential IDs may also be serialized as objects
                const allowCredentials = (options.allowCredentials || []).map(cred => {
                    let credId;
                    try {
                        let credIdString = null;
                        
                        if (cred.id && typeof cred.id === 'object') {
                            if (cred.id.value) {
                                credIdString = cred.id.value;
                            } else if (Array.isArray(cred.id)) {
                                credId = new Uint8Array(cred.id);
                            } else {
                                throw new Error('Credential ID object does not have expected format');
                            }
                        } else if (typeof cred.id === 'string') {
                            credIdString = cred.id;
                        } else if (Array.isArray(cred.id)) {
                            credId = new Uint8Array(cred.id);
                        } else {
                            throw new Error(`Unexpected credential ID type: ${typeof cred.id}`);
                        }

                        // If we have a string, decode it from Base64URL
                        if (credIdString !== null) {
                            if (!credIdString || credIdString.trim() === '') {
                                throw new Error('Credential ID string is empty');
                            }
                            credId = base64UrlToUint8Array(credIdString);
                        }

                        if (!credId || credId.length === 0) {
                            throw new Error('Credential ID bytes are empty after decoding');
                        }
                    } catch (error) {
                        console.error('[ERROR] Credential ID decoding failed:', error);
                        throw new Error(`Failed to decode credential ID: ${error.message}`);
                    }
                    
                    return {
                        id: credId,
                        type: cred.type || 'public-key'
                    };
                });

                const credential = await navigator.credentials.get({
                    publicKey: {
                        challenge: challengeBytes,
                        allowCredentials: allowCredentials,
                        rpId: options.rpId,
                        userVerification: options.userVerification || 'preferred',
                        timeout: 60000 // 60 seconds timeout
                    }
                });

                if (!credential) {
                    throw new Error('Không nhận được thông tin xác thực');
                }

                // Step 3: Send credential to server
                const credentialForServer = {
                    id: credential.id,
                    rawId: Array.from(new Uint8Array(credential.rawId)),
                    response: {
                        authenticatorData: Array.from(new Uint8Array(credential.response.authenticatorData)),
                        clientDataJSON: Array.from(new Uint8Array(credential.response.clientDataJSON)),
                        signature: Array.from(new Uint8Array(credential.response.signature)),
                        userHandle: credential.response.userHandle ? Array.from(new Uint8Array(credential.response.userHandle)) : null
                    },
                    type: credential.type
                };

                const finishResponse = await fetch(`/login-passkey/finish?email=${encodeURIComponent(email)}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(credentialForServer)
                });

                const result = await finishResponse.text();
                if (finishResponse.ok) {
                    localStorage.setItem('jwt', result);
                    showSuccess('Xác thực thành công! Đang chuyển hướng...');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 500);
                } else {
                    showError('Xác thực passkey thất bại: ' + result);
                    setButtonLoading('passkeyLoginBtn', false);
                }
            } catch (error) {
                let errorMessage = 'Lỗi: ' + error.message;
                
                if (error.name === 'NotAllowedError') {
                    errorMessage = 'Người dùng đã hủy xác thực hoặc hết thời gian chờ';
                } else if (error.name === 'InvalidStateError') {
                    errorMessage = 'Passkey đã được sử dụng hoặc không hợp lệ';
                } else if (error.name === 'NotSupportedError') {
                    errorMessage = 'Trình duyệt hoặc thiết bị không hỗ trợ WebAuthn';
                } else if (error.name === 'SecurityError') {
                    errorMessage = 'Lỗi bảo mật: Vui lòng kiểm tra domain và HTTPS';
                }
                
                showError(errorMessage);
                setButtonLoading('passkeyLoginBtn', false);
            }
        });

        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
        }
    </script>
</body>
</html>
