<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passkey Demo - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body text-center">
                        <h1 class="card-title mb-4">Passkey Demo</h1>
                        <p class="card-text mb-4">Đăng nhập bằng Biometric/Passkey hoặc mật khẩu</p>
                        <div class="d-grid gap-2">
                            <a th:href="@{/login}" class="btn btn-primary btn-lg">Đăng nhập</a>
                            <a th:href="@{/register}" class="btn btn-outline-primary btn-lg">Đăng ký</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
